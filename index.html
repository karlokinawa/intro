<style>
:root {
  --stage-w: 3784;

  --stage-scale: 1;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  touch-action: manipulation;
  font-family: Arial, Helvetica, sans-serif;
  background:#0f2148;
  color: #ddd;
}
body { position: fixed; inset: 0; }
#viewer {
  position: fixed;
  inset: 0;
  overflow: hidden;
  padding-top: var(--safe-top);
  padding-right: var(--safe-right);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  box-sizing: border-box;
  background: transparent;
}
#stageShell {
  position: absolute;
  left: 0;
  top: 0;
  width: calc(var(--stage-w) * 1px);
  height: calc(var(--stage-h) * 1px);
  pointer-events: none;
}
#stage {
  position: relative;
  width: 3784px;
  height: 2838px;
  overflow: visible;
  margin: 0;
  background: transparent;
  transform-origin: 0 0;
  will-change: transform;
}
.layer {
  position: absolute;
  transform-origin: 0 0;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
#dial { left: 0; top: 0; width: 3784px; height: 2838px; transform:none !important;

  z-index:3 !important;

  backface-visibility: hidden !important;

  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#hint {
  position: fixed;

<script>
(function(){
  const STAGE_W = 3784;
  const STAGE_H = 2838;
  const START_SCALE = 0.6;
  const stage = document.getElementById('stage');
  const viewer = document.getElementById('viewer');
  if(!stage || !viewer) return;

  function applyCamera(){
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const fitScale = Math.min(vw / STAGE_W, vh / STAGE_H);
    const scale = Math.min(START_SCALE, fitScale);
    const x = Math.round((vw - STAGE_W * scale) / 2);
    const y = Math.round((vh - STAGE_H * scale) / 2);
    stage.style.transformOrigin = '0 0';
    stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
  }

  window.addEventListener('resize', applyCamera, {passive:true});
  window.addEventListener('orientationchange', applyCamera, {passive:true});
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(applyCamera).catch(function(){});
  }
  applyCamera();
})();
</script>

  const endX = 1615;

  const startX = 3400;

  const dx = startX - endX;
  const dy = startY - endY;

  
  moon.style.transform = `translate(${dx}px, ${dy}px)`;
  moon.style.opacity = "1";

  if(dial){
    dial.style.transition = "none";
    dial.style.opacity = "0.45";
  }

  void moon.offsetHeight;

  // 1s Startpause, dann 4.7s Einflug
  setTimeout(() => {
    
    moon.style.transform = "translate(0px,0px)";

    // Dial wird erst kurz vor Schluss ganz sichtbar:
    // 3.7s warten, dann in 1.0s auf 100%
    if(dial){
      setTimeout(() => {
        dial.style.transition = "opacity 1000ms ease-in-out";
        dial.style.opacity = "1.0";
      }, 3700);
    }
  }, 1000);

  // fertiges Produkt 1s stehen lassen, dann zur Uhr weiter
  if (typeof __i4_goWatch === "function") {
